<div class="page scrl" id="pg-activity" style="overflow-y:auto !important;overflow-x:hidden !important;min-height:0;height:100%;">
  <div class="info-card">
    <div class="card-head">
      <h3>📋 Activity Log</h3>
      <div style="display:flex;gap:7px;align-items:center;flex-wrap:wrap;">
        <select class="fi" id="activity-filter-type" style="width:auto;padding:5px 10px;font-size:12px;" onchange="renderActivityLog()">
          <option value="">All Actions</option>
          <option value="created">Created</option>
          <option value="status">Status Changed</option>
          <option value="tracking">Tracking Added</option>
          <option value="edited">Edited</option>
          <option value="deleted">Deleted</option>
          <option value="issue">⚠️ Issues</option>
          <option value="notification">🔔 Notifications</option>
        </select>
        <button class="btn btn-danger btn-xs" onclick="clearActivityLog()">🗑️ Clear Log</button>
      </div>
    </div>
    <div id="activity-list"></div>
  </div>
</div>
