<div class="page scrl" id="pg-catalog" style="overflow-y:auto !important;overflow-x:hidden !important;min-height:0;height:100%;">
  <div class="info-card" style="margin-bottom:13px;">
    <div class="card-head">
      <h3>🛍️ Product Catalog</h3>
      <div style="display:flex;gap:7px;flex-wrap:wrap;">
        <button class="btn btn-ghost btn-sm" onclick="openManageCatsModal()">🏷️ Categories</button>
        <button class="btn btn-ghost btn-sm" onclick="shareCatalog()">📤 Share</button>
        <button class="btn btn-primary btn-sm" onclick="openCatalogModal()">＋ Add Product</button>
      </div>
    </div>
    <p style="font-size:12px;color:var(--muted);margin-bottom:10px;">Add products with categories and variants. Share the catalog with customers to browse and order.</p>
    <div id="catalog-cat-bar" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;"></div>
    <div id="catalog-list"></div>
  </div>
  <div class="info-card">
    <div class="card-head"><h3>📥 Import Order</h3></div>
    <div style="display:flex;gap:7px;">
      <input type="text" class="fi" id="import-order-input" placeholder="Paste order code here… (JRORDER-xxxxx)" style="flex:1;font-family:var(--mono);font-size:13px;">
      <button class="btn btn-primary" onclick="importOrderFromCode()">📥 Import</button>
    </div>
    <div id="import-order-preview" style="margin-top:11px;"></div>
  </div>
</div>
