<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JRSHOP Catalog</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:#f4f6fb;color:#0f172a}
.top{position:sticky;top:0;z-index:20;background:linear-gradient(135deg,#1f2937,#111827);color:#fff;padding:14px 14px 12px;border-bottom:1px solid rgba(255,255,255,.08)}
.top-row{display:flex;align-items:center;justify-content:space-between;gap:10px}
.brand{font-weight:900;letter-spacing:.2px}
.sub{font-size:12px;opacity:.75;margin-top:3px}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:9px 13px;border-radius:10px;border:1px solid #dbe1ea;background:#fff;color:#111827;text-decoration:none;font-weight:700;cursor:pointer}
.btn-pri{background:#f97316;border-color:#f97316;color:#fff}
.btn-ghost{background:#fff}
.btn[disabled]{opacity:.5;cursor:not-allowed}
.wrap{max-width:1100px;margin:0 auto;padding:14px}
.empty{background:#fff;border:1px solid #e2e8f0;border-radius:14px;padding:30px;text-align:center;color:#64748b}
.toolbar{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.search{flex:1;min-width:220px;display:flex;align-items:center;gap:8px;background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:10px 12px}
.search input{width:100%;border:none;outline:none;background:transparent;font-size:14px}
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
.cat-card{background:#fff;border:1px solid #e2e8f0;border-radius:14px;padding:16px 14px;cursor:pointer}
.cat-name{font-size:14px;font-weight:800}
.cat-count{margin-top:6px;font-size:12px;color:#64748b}
.prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:12px}
.prod{background:#fff;border:1px solid #e2e8f0;border-radius:14px;overflow:hidden;display:flex;flex-direction:column}
.img-wrap{width:100%;aspect-ratio:1/1;background:#eef2f7;display:flex;align-items:center;justify-content:center}
.img-wrap img{width:100%;height:100%;object-fit:cover}
.ph{font-size:28px;color:#94a3b8}
.body{padding:10px 11px 12px}
.name{font-size:14px;font-weight:800}
.desc{margin-top:5px;font-size:12px;color:#64748b;min-height:30px}
.price{margin-top:8px;font-size:18px;font-weight:900;color:#f97316}
.stock{display:inline-block;margin-top:6px;font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px}
.in{background:#dcfce7;color:#166534}
.out{background:#fee2e2;color:#991b1b}
.prod-actions{display:flex;gap:8px;padding:0 11px 11px}
.prod-actions .btn{flex:1}
.float-cart{position:fixed;right:16px;bottom:18px;z-index:25;display:none}
.sheet-back{position:fixed;inset:0;background:rgba(2,6,23,.45);z-index:40;display:none;align-items:flex-end;justify-content:center}
.sheet-back.on{display:flex}
.sheet{background:#fff;width:100%;max-width:650px;max-height:92vh;border-radius:18px 18px 0 0;overflow:auto;padding:16px}
.drag{width:42px;height:4px;background:#dbe3ef;border-radius:99px;margin:0 auto 12px}
.hrow{display:flex;justify-content:space-between;align-items:center;gap:8px}
.opt-wrap{margin-top:10px}
.opt-title{font-size:12px;font-weight:800;color:#334155;margin-bottom:6px}
.chips{display:flex;gap:7px;flex-wrap:wrap}
.chip{padding:7px 12px;border:1.5px solid #dbe3ef;border-radius:10px;background:#fff;font-size:13px;font-weight:700;cursor:pointer}
.chip.on{border-color:#f97316;background:#fff7ed;color:#f97316}
.chip-img{width:28px;height:28px;border-radius:8px;object-fit:cover;border:1px solid #e2e8f0}
.gallery-row{display:flex;gap:8px;overflow-x:auto;padding:4px 0 2px;margin-top:9px}
.gallery-thumb{width:54px;height:54px;border-radius:9px;border:2px solid #e2e8f0;object-fit:cover;cursor:pointer;flex-shrink:0;background:#fff}
.gallery-thumb.on{border-color:#f97316}
.qty{display:flex;align-items:center;gap:10px;margin-top:10px}
.qty button{width:34px;height:34px;border:1px solid #dbe3ef;border-radius:10px;background:#fff;font-size:18px;cursor:pointer}
.qty b{font-size:18px;min-width:26px;text-align:center}
.cart-item{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid #eef2f7}
.cart-item:last-child{border-bottom:none}
.tiny{font-size:12px;color:#64748b}
.sum{margin-top:10px;padding-top:10px;border-top:1px solid #e2e8f0}
.sum-row{display:flex;justify-content:space-between;margin-bottom:6px}
.sum-row.total{font-size:20px;font-weight:900;color:#f97316;margin-top:6px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.form-grid .full{grid-column:1/-1}
.fi{width:100%;padding:10px 12px;border:1px solid #dbe3ef;border-radius:10px;font-size:14px;outline:none}
.toast{position:fixed;left:50%;bottom:85px;transform:translateX(-50%);background:#111827;color:#fff;padding:10px 14px;border-radius:10px;font-size:13px;z-index:60;opacity:0;transition:.2s}
.toast.on{opacity:1}
@media (max-width:640px){
  .prod-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
  .form-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
  <div class="top">
    <div class="top-row">
      <div>
        <div class="brand">JRSHOP Catalog</div>
        <div class="sub">Choose category → product → variant → address → copy & send</div>
      </div>
      <a class="btn btn-ghost" href="./index.html">Open App</a>
    </div>
  </div>

  <div class="wrap">
    <div id="state" class="empty">Loading catalog...</div>

    <div id="shop" style="display:none;">
      <div class="toolbar">
        <button class="btn" id="back-cats" style="display:none;" onclick="showCategories()">← Categories</button>
        <div class="search"><span>🔍</span><input id="search" placeholder="Search products..." oninput="renderProducts()"></div>
      </div>

      <div id="cats" class="cat-grid"></div>
      <div id="products" class="prod-grid" style="display:none;"></div>
    </div>
  </div>

  <button id="float-cart" class="btn btn-pri float-cart" onclick="openCart()">🛒 <span id="cart-count">0</span></button>

  <div id="prod-sheet-back" class="sheet-back" onclick="if(event.target===this)closeProductSheet()">
    <div class="sheet">
      <div class="drag"></div>
      <div id="prod-sheet-content"></div>
    </div>
  </div>

  <div id="cart-sheet-back" class="sheet-back" onclick="if(event.target===this)closeCart()">
    <div class="sheet">
      <div class="drag"></div>
      <div class="hrow">
        <h3 style="margin:0">🛒 Your Cart</h3>
        <button class="btn" onclick="closeCart()">Close</button>
      </div>
      <div id="cart-list" style="margin-top:8px;"></div>
      <div id="cart-summary" class="sum"></div>
      <div class="hrow" style="margin-top:10px;">
        <button class="btn" onclick="clearCart()">Clear</button>
        <button id="go-checkout" class="btn btn-pri" onclick="openCheckout()" disabled>Checkout</button>
      </div>
    </div>
  </div>

  <div id="checkout-sheet-back" class="sheet-back" onclick="if(event.target===this)closeCheckout()">
    <div class="sheet">
      <div class="drag"></div>
      <div class="hrow">
        <h3 style="margin:0">Customer Details</h3>
        <button class="btn" onclick="closeCheckout()">Close</button>
      </div>
      <p class="tiny" style="margin:8px 0 12px;">Payment is handled manually in Messenger after seller review.</p>
      <div class="form-grid">
        <input class="fi full" id="co-name" placeholder="Full Name *">
        <input class="fi" id="co-phone" placeholder="Phone *">
        <input class="fi" id="co-email" placeholder="Email *">
        <input class="fi full" id="co-addr" placeholder="Address *">
        <input class="fi" id="co-city" placeholder="City *">
        <input class="fi" id="co-post" placeholder="Postcode *">
        <textarea class="fi full" id="co-note" placeholder="Notes (optional)" rows="3"></textarea>
      </div>
      <div style="margin-top:12px;">
        <button class="btn btn-pri" style="width:100%;" onclick="copyAndSendToMessenger()">📋 Copy & Send to Messenger</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

<script>
(function(){
  const stateEl=document.getElementById('state');
  const shopEl=document.getElementById('shop');
  const catsEl=document.getElementById('cats');
  const productsEl=document.getElementById('products');
  const backCatsBtn=document.getElementById('back-cats');
  const searchEl=document.getElementById('search');
  const floatCartBtn=document.getElementById('float-cart');
  const cartCountEl=document.getElementById('cart-count');
  const cartListEl=document.getElementById('cart-list');
  const cartSummaryEl=document.getElementById('cart-summary');
  const goCheckoutBtn=document.getElementById('go-checkout');

  let products=[];
  let categories=[];
  let activeCategory='';
  let cart=[];
  let currentProduct=null;
  let selectedOptions={};
  let selectedImage='';
  let qty=1;
  let messengerLink='https://www.messenger.com';
  let _remoteCatalogSignature='';

  function toast(msg){
    const el=document.getElementById('toast');
    if(!el) return;
    el.textContent=String(msg||'');
    el.classList.add('on');
    setTimeout(()=>el.classList.remove('on'),2200);
  }

  function fetchWithTimeout(url, ms, init){
    const timeoutMs=Math.max(1200,Number(ms)||6000);
    const controller=new AbortController();
    const timer=setTimeout(()=>controller.abort(),timeoutMs);
    const reqInit={...(init||{}),signal:controller.signal};
    return fetch(url,reqInit).finally(()=>clearTimeout(timer));
  }

  function esc(s){
    return String(s==null?'':s)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;')
      .replace(/'/g,'&#39;');
  }

  function money(v){
    const n=Number(v)||0;
    return '£'+n.toFixed(2);
  }

  function parsePrice(raw){
    const str=String(raw==null?'':raw).replace(/[^0-9.]/g,'');
    const n=Number(str);
    return Number.isFinite(n)?n:0;
  }

  function normalizeImageValue(raw){
    const src=String(raw==null?'':raw).trim();
    return /^(https?:|data:|blob:|\/api\/image\/)/.test(src)?src:'';
  }

  function normalizeOpt(x){
    if(typeof x==='string') return {value:x,label:x};
    if(x&&typeof x==='object'){
      const val=String(x.value||x.label||x.name||'').trim();
      if(!val) return null;
      return {value:val,label:val,img:normalizeImageValue(x.img||x.image||'')};
    }
    return null;
  }

  function extractOptionGroups(p){
    const groups=[];
    function pushGroup(name,list){
      const opts=(Array.isArray(list)?list:[]).map(normalizeOpt).filter(Boolean);
      const uniq=[...new Map(opts.map(o=>[o.value,o])).values()];
      if(uniq.length) groups.push({name:String(name||'Option'),options:uniq});
    }
    const variantGroups=Array.isArray(p.variantGroups)?p.variantGroups:[];
    variantGroups.forEach(g=>{
      const values=Array.isArray(g&&g.values)?g.values:[];
      const withImgs=values.map(v=>{
        const normalized=normalizeOpt(v);
        if(!normalized) return null;
        if(g&&g.hasImg) normalized.img=normalizeImageValue(v&&v.img||normalized.img||'');
        return normalized;
      }).filter(Boolean);
      pushGroup(g&&g.name||'Option',withImgs);
    });

    if(Array.isArray(p.sizes)) pushGroup('Size',p.sizes);
    if(Array.isArray(p.colors)) pushGroup('Color',p.colors);

    const variants=Array.isArray(p.variants)?p.variants:[];
    variants.forEach(v=>{
      if(typeof v==='string'){
        pushGroup('Variant',[v]);
        return;
      }
      if(!v||typeof v!=='object') return;
      if(Array.isArray(v.options)){
        pushGroup(v.name||v.label||v.type||'Option',v.options);
      }else{
        const one=normalizeOpt(v);
        if(one) pushGroup('Variant',[one]);
      }
    });

    const merged={};
    groups.forEach(g=>{
      const key=g.name.toLowerCase();
      if(!merged[key]) merged[key]={name:g.name,options:[]};
      merged[key].options.push(...g.options);
    });
    return Object.values(merged).map(g=>({
      name:g.name,
      options:[...new Map(g.options.map(o=>[o.value,o])).values()]
    }));
  }

  function normalizeProduct(p){
    const name=String(p&&p.name||'').trim();
    if(!name) return null;
    const image=String(p&&p.img||'').trim();
    const safeImg=normalizeImageValue(image);
    const gallery=(Array.isArray(p&&p.images)?p.images:[]).map(normalizeImageValue).filter(Boolean);
    if(safeImg && !gallery.includes(safeImg)) gallery.unshift(safeImg);
    const category=String(p&&p.category||'General').trim()||'General';
    return {
      id:String(p&&p.id||('p_'+Math.random().toString(36).slice(2,8))),
      name,
      desc:String(p&&p.desc||'').trim(),
      category,
      price:parsePrice(p&&p.price),
      inStock:p&&p.inStock!==false,
      img:gallery[0]||safeImg,
      images:gallery,
      optionGroups:extractOptionGroups(p||{})
    };
  }

  function loadLocalCatalog(){
    try{
      const raw=localStorage.getItem('jb_catalog');
      const arr=raw?JSON.parse(raw):[];
      return Array.isArray(arr)?arr:[];
    }catch(_e){
      return [];
    }
  }

  async function loadRemoteData(){
    const res=await fetchWithTimeout('/api/data',7000,{cache:'no-store',headers:{'Cache-Control':'no-cache'}});
    if(!res.ok) throw new Error('HTTP '+res.status);
    const payload=await res.json();
    const data=payload&&payload.data?payload.data:{};
    return {
      catalog:Array.isArray(data.jb_catalog)?data.jb_catalog:[],
      categories:Array.isArray(data.jb_cat_categories)?data.jb_cat_categories:[],
      settings:(data.jb_settings&&typeof data.jb_settings==='object')?data.jb_settings:{}
    };
  }

  function deriveCategories(list,fromServer){
    const fromProducts=[...new Set((list||[]).map(p=>p.category).filter(Boolean))];
    const merged=[...(Array.isArray(fromServer)?fromServer:[]),...fromProducts];
    const uniq=[...new Set(merged.map(c=>String(c||'').trim()).filter(Boolean))];
    return uniq.length?uniq:['General'];
  }

  function showCategories(){
    activeCategory='';
    backCatsBtn.style.display='none';
    catsEl.style.display='grid';
    productsEl.style.display='none';
    searchEl.value='';
    renderCategories();
  }
  window.showCategories=showCategories;

  function renderCategories(){
    const counts={};
    categories.forEach(c=>counts[c]=0);
    products.forEach(p=>{counts[p.category]=(counts[p.category]||0)+1;});
    const allCount=products.length;
    const cards=[
      {name:'All Products',count:allCount}
    ].concat(categories.map(c=>({name:c,count:counts[c]||0})));
    catsEl.innerHTML=cards.map(function(c){
      return `<button class="cat-card" onclick="openCategory('${esc(c.name)}')">
        <div class="cat-name">${esc(c.name)}</div>
        <div class="cat-count">${c.count} products</div>
      </button>`;
    }).join('');
  }

  function openCategory(cat){
    activeCategory=cat==='All Products'?'':cat;
    backCatsBtn.style.display='inline-flex';
    catsEl.style.display='none';
    productsEl.style.display='grid';
    renderProducts();
  }
  window.openCategory=openCategory;

  function productMatchesQuery(p,q){
    if(!q) return true;
    const hay=(p.name+' '+p.desc+' '+p.category).toLowerCase();
    return hay.indexOf(q)>=0;
  }

  function renderProducts(){
    const q=String(searchEl.value||'').trim().toLowerCase();
    const list=products.filter(function(p){
      if(activeCategory && p.category!==activeCategory) return false;
      return productMatchesQuery(p,q);
    });
    if(!list.length){
      productsEl.innerHTML='<div class="empty" style="grid-column:1/-1;">No products found in this category.</div>';
      return;
    }
    productsEl.innerHTML=list.map(function(p){
      const img=p.img?`<img src="${esc(p.img)}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';"><div class="ph" style="display:none;">🛍️</div>`:'<div class="ph">🛍️</div>';
      const stock=p.inStock?'<span class="stock in">In stock</span>':'<span class="stock out">Out of stock</span>';
      return `<div class="prod">
        <div class="img-wrap">${img}</div>
        <div class="body">
          <div class="name">${esc(p.name)}</div>
          <div class="desc">${esc(p.desc||'')}</div>
          <div class="price">${money(p.price)}</div>
          ${stock}
        </div>
        <div class="prod-actions">
          <button class="btn" onclick="openProductSheet('${esc(p.id)}')">Details</button>
          <button class="btn btn-pri" ${p.inStock?'':'disabled'} onclick="quickAdd('${esc(p.id)}')">Add</button>
        </div>
      </div>`;
    }).join('');
  }
  window.renderProducts=renderProducts;

  function findProduct(id){
    return products.find(p=>p.id===id)||null;
  }

  function openProductSheet(id){
    const p=findProduct(id);
    if(!p) return;
    currentProduct=p;
    qty=1;
    selectedOptions={};
    selectedImage='';
    (p.optionGroups||[]).forEach(g=>{
      if(g.options&&g.options[0]) selectedOptions[g.name]=g.options[0].value;
    });
    selectedImage=resolveProductImage(p,selectedOptions,p.img||'');
    drawProductSheet();
    document.getElementById('prod-sheet-back').classList.add('on');
  }
  window.openProductSheet=openProductSheet;

  function closeProductSheet(){
    document.getElementById('prod-sheet-back').classList.remove('on');
  }
  window.closeProductSheet=closeProductSheet;

  function getProductOptionByValue(product,groupName,value){
    const group=(product&&product.optionGroups||[]).find(g=>g.name===groupName);
    if(!group) return null;
    return (group.options||[]).find(o=>String(o.value)===String(value))||null;
  }

  function resolveProductImage(product,opts,fallback){
    if(product&&opts){
      for(const group of (product.optionGroups||[])){
        const val=opts[group.name];
        if(!val) continue;
        const opt=getProductOptionByValue(product,group.name,val);
        if(opt&&opt.img) return opt.img;
      }
    }
    const gallery=Array.isArray(product&&product.images)?product.images:[];
    return fallback||gallery[0]||String(product&&product.img||'');
  }

  function getProductGallery(product){
    const base=Array.isArray(product&&product.images)?product.images:[];
    const fromOptions=(product&&product.optionGroups||[]).flatMap(g=>(g.options||[]).map(o=>o&&o.img||'').filter(Boolean));
    const merged=[...base,...fromOptions].filter(Boolean);
    return [...new Set(merged)];
  }

  function setOption(group,val){
    selectedOptions[group]=val;
    const opt=getProductOptionByValue(currentProduct,group,val);
    if(opt&&opt.img) selectedImage=opt.img;
    else selectedImage=resolveProductImage(currentProduct,selectedOptions,selectedImage||currentProduct&&currentProduct.img||'');
    drawProductSheet();
  }
  window.setOption=setOption;

  function setOptionByIndex(groupIdx,optIdx){
    if(!currentProduct) return;
    const group=(currentProduct.optionGroups||[])[groupIdx];
    if(!group) return;
    const opt=(group.options||[])[optIdx];
    if(!opt) return;
    setOption(group.name,opt.value);
  }
  window.setOptionByIndex=setOptionByIndex;

  function selectProductImage(src){
    selectedImage=String(src||'');
    drawProductSheet();
  }
  window.selectProductImage=selectProductImage;

  function setQty(delta){
    qty=Math.max(1,qty+delta);
    drawProductSheet();
  }
  window.setQty=setQty;

  function optionSummary(opts){
    const keys=Object.keys(opts||{});
    if(!keys.length) return '';
    return keys.map(k=>k+': '+opts[k]).join(', ');
  }

  function drawProductSheet(){
    if(!currentProduct) return;
    const p=currentProduct;
    const mainImage=selectedImage||resolveProductImage(p,selectedOptions,p.img||'');
    const img=mainImage?`<img src="${esc(mainImage)}" style="width:100%;aspect-ratio:4/3;object-fit:cover;border-radius:12px;margin:8px 0 10px;">`:'';
    const gallery=getProductGallery(p);
    const groups=(p.optionGroups||[]).map(g=>{
      const groupIdx=(p.optionGroups||[]).findIndex(x=>x.name===g.name);
      const chips=(g.options||[]).map((o,optIdx)=>{
        const on=selectedOptions[g.name]===o.value;
        if(o.img){
          return `<button class="chip ${on?'on':''}" onclick="setOptionByIndex(${groupIdx},${optIdx})" style="display:flex;align-items:center;gap:6px;">
            <img class="chip-img" src="${esc(o.img)}"><span>${esc(o.label)}</span>
          </button>`;
        }
        return `<button class="chip ${on?'on':''}" onclick="setOptionByIndex(${groupIdx},${optIdx})">${esc(o.label)}</button>`;
      }).join('');
      return `<div class="opt-wrap">
        <div class="opt-title">${esc(g.name)}</div>
        <div class="chips">${chips}</div>
      </div>`;
    }).join('');
    const galleryHtml=gallery.length>1?`<div class="gallery-row">${
      gallery.map(src=>{
        const token=encodeURIComponent(src);
        return `<img class="gallery-thumb ${mainImage===src?'on':''}" src="${esc(src)}" onclick="selectProductImage(decodeURIComponent('${token}'))">`;
      }).join('')
    }</div>`:'';
    const html=`<div class="hrow">
      <h3 style="margin:0">${esc(p.name)}</h3>
      <button class="btn" onclick="closeProductSheet()">Close</button>
    </div>
    ${img}
    ${galleryHtml}
    <div class="tiny">${esc(p.desc||'')}</div>
    <div style="margin-top:8px;font-size:22px;font-weight:900;color:#f97316;">${money(p.price)}</div>
    ${groups}
    <div class="qty">
      <button onclick="setQty(-1)">−</button><b>${qty}</b><button onclick="setQty(1)">+</button>
    </div>
    <div style="margin-top:12px;">
      <button class="btn btn-pri" style="width:100%;" ${p.inStock?'':'disabled'} onclick="addCurrentToCart()">Add to Cart</button>
    </div>`;
    document.getElementById('prod-sheet-content').innerHTML=html;
  }

  function cartKeyFor(product,opts){
    return product.id+'|'+JSON.stringify(opts||{});
  }

  function addToCart(product,opts,count){
    const key=cartKeyFor(product,opts);
    const itemImage=resolveProductImage(product,opts,selectedImage||product.img||'');
    const existing=cart.find(i=>i.key===key);
    if(existing){
      existing.qty+=count;
    }else{
      cart.push({
        key,
        id:product.id,
        name:product.name,
        price:product.price,
        qty:count,
        img:itemImage||'',
        category:product.category||'',
        options:{...(opts||{})}
      });
    }
    updateCartUi();
  }

  function addCurrentToCart(){
    if(!currentProduct) return;
    addToCart(currentProduct,selectedOptions,qty);
    closeProductSheet();
    toast('Added to cart');
  }
  window.addCurrentToCart=addCurrentToCart;

  function quickAdd(id){
    const p=findProduct(id);
    if(!p) return;
    const opts={};
    (p.optionGroups||[]).forEach(g=>{
      if(g.options&&g.options[0]) opts[g.name]=g.options[0].value;
    });
    selectedImage=resolveProductImage(p,opts,p.img||'');
    addToCart(p,opts,1);
    toast('Added to cart');
  }
  window.quickAdd=quickAdd;

  function updateCartUi(){
    const count=cart.reduce((s,i)=>s+(Number(i.qty)||0),0);
    cartCountEl.textContent=String(count);
    floatCartBtn.style.display=count?'inline-flex':'none';
    goCheckoutBtn.disabled=!count;
    renderCart();
  }

  function openCart(){
    renderCart();
    document.getElementById('cart-sheet-back').classList.add('on');
  }
  window.openCart=openCart;

  function closeCart(){
    document.getElementById('cart-sheet-back').classList.remove('on');
  }
  window.closeCart=closeCart;

  function setCartQty(i,delta){
    if(!cart[i]) return;
    cart[i].qty=Math.max(0,(Number(cart[i].qty)||0)+delta);
    if(cart[i].qty===0) cart.splice(i,1);
    updateCartUi();
  }
  window.setCartQty=setCartQty;

  function removeCartItem(i){
    cart.splice(i,1);
    updateCartUi();
  }
  window.removeCartItem=removeCartItem;

  function clearCart(){
    cart=[];
    updateCartUi();
  }
  window.clearCart=clearCart;

  function getCartTotals(){
    const subtotal=cart.reduce((s,i)=>s+((Number(i.price)||0)*(Number(i.qty)||0)),0);
    const itemCount=cart.reduce((s,i)=>s+(Number(i.qty)||0),0);
    if(!itemCount) return {subtotal:0,shipping:0,total:0,itemCount:0};
    const categories=new Set();
    for(const item of cart){
      const cat=String(item&&item.category||findProduct(item&&item.id||'')?.category||'').trim();
      if(cat) categories.add(cat);
    }
    let shipping=0;
    if(categories.size<=1){
      shipping=5+Math.max(0,itemCount-4)*2.5;
    }else{
      shipping=5+Math.max(0,itemCount-1)*2.5;
    }
    return {subtotal,shipping,total:subtotal+shipping,itemCount,categoriesCount:categories.size||1};
  }

  function renderCart(){
    if(!cart.length){
      cartListEl.innerHTML='<div class="empty">Your cart is empty.</div>';
      cartSummaryEl.innerHTML='';
      return;
    }
    cartListEl.innerHTML=cart.map(function(item,i){
      const opts=optionSummary(item.options);
      const img=item.img?`<img src="${esc(item.img)}" style="width:52px;height:52px;border-radius:10px;object-fit:cover;">`:'<div class="ph" style="width:52px;height:52px;border-radius:10px;background:#eef2f7;font-size:20px;">🛍️</div>';
      return `<div class="cart-item">
        ${img}
        <div style="flex:1;">
          <div style="font-size:13px;font-weight:800;">${esc(item.name)}</div>
          ${opts?`<div class="tiny">${esc(opts)}</div>`:''}
          <div style="margin-top:4px;font-size:13px;font-weight:800;color:#f97316;">${money(item.price*item.qty)}</div>
        </div>
        <div style="display:flex;align-items:center;gap:6px;">
          <button class="btn" style="padding:4px 8px;" onclick="setCartQty(${i},-1)">−</button>
          <b style="min-width:16px;text-align:center;">${item.qty}</b>
          <button class="btn" style="padding:4px 8px;" onclick="setCartQty(${i},1)">+</button>
          <button class="btn" style="padding:4px 8px;" onclick="removeCartItem(${i})">✕</button>
        </div>
      </div>`;
    }).join('');
    const totals=getCartTotals();
    cartSummaryEl.innerHTML=`
      <div class="sum-row"><span>Items</span><span>${totals.itemCount}</span></div>
      <div class="sum-row"><span>Subtotal</span><span>${money(totals.subtotal)}</span></div>
      <div class="sum-row"><span>Shipping</span><span>${money(totals.shipping)}</span></div>
      <div class="sum-row total"><span>Total</span><span>${money(totals.total)}</span></div>
      <div class="tiny" style="margin-top:6px;">Shipping rule: same category up to 4 items = £5, mixed categories = £5 first item + £2.50 each extra item.</div>
    `;
  }

  function openCheckout(){
    if(!cart.length){
      toast('Cart is empty');
      return;
    }
    closeCart();
    document.getElementById('checkout-sheet-back').classList.add('on');
  }
  window.openCheckout=openCheckout;

  function closeCheckout(){
    document.getElementById('checkout-sheet-back').classList.remove('on');
  }
  window.closeCheckout=closeCheckout;

  function getInput(id){
    return String((document.getElementById(id)&&document.getElementById(id).value)||'').trim();
  }

  function buildOrderCode(){
    const rnd=Math.random().toString(36).slice(2,8).toUpperCase();
    return 'JR-'+rnd;
  }

  function normalizeMessengerLink(raw){
    let url=String(raw||'').trim();
    if(!url) return '';
    if(!/^https?:\/\//i.test(url)) url='https://'+url;
    if(/facebook\.com\//i.test(url) && !/m\.me\//i.test(url)){
      const match=url.match(/facebook\.com\/([^/?#]+)/i);
      if(match&&match[1]) url='https://m.me/'+match[1];
    }
    return url;
  }

  function shouldAutoOpenMessenger(url){
    if(!url) return false;
    return !/^https?:\/\/(www\.)?(messenger\.com|m\.me)\/?$/i.test(url);
  }

  async function copyAndSendToMessenger(){
    const name=getInput('co-name');
    const phone=getInput('co-phone');
    const email=getInput('co-email');
    const addr=getInput('co-addr');
    const city=getInput('co-city');
    const post=getInput('co-post');
    const note=getInput('co-note');
    if(!name||!phone||!email||!addr||!city||!post){
      toast('Please fill all required fields');
      return;
    }
    if(!cart.length){
      toast('Cart is empty');
      return;
    }
    const code=buildOrderCode();
    const totals=getCartTotals();
    const subtotal=totals.subtotal;
    const shipping=totals.shipping;
    const total=totals.total;
    const lines=cart.map(function(i,idx){
      const opts=optionSummary(i.options);
      return `${idx+1}) ${i.name}${opts?' ('+opts+')':''} x${i.qty} = ${money(i.price*i.qty)}`;
    });
    const payload={
      code,
      name,
      phone,
      email,
      address:addr,
      city,
      postcode:post,
      note,
      products:cart.map(i=>({name:i.name,qty:i.qty,price:i.price,options:i.options,category:i.category||''})),
      subtotal,
      shipping,
      total,
      ts:Date.now()
    };
    let dataToken='';
    try{dataToken=btoa(unescape(encodeURIComponent(JSON.stringify(payload))));}catch(_e){}
    const message=[
      'JRSHOP ORDER',
      'Order Code: '+code,
      '',
      'Customer:',
      'Name: '+name,
      'Phone: '+phone,
      'Email: '+email,
      'Address: '+addr+', '+city+' '+post,
      note?('Note: '+note):'',
      '',
      'Items:',
      ...lines,
      '',
      'SUBTOTAL: '+money(subtotal),
      'SHIPPING: '+money(shipping),
      'TOTAL: '+money(total),
      dataToken?('[Data:'+dataToken+']'):''
    ].filter(Boolean).join('\n');

    try{
      await navigator.clipboard.writeText(message);
      toast('Order copied. Opening Messenger...');
    }catch(_e){
      const ta=document.createElement('textarea');
      ta.value=message;
      ta.style.position='fixed';
      ta.style.left='-9999px';
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      try{document.execCommand('copy');}catch(__e){}
      document.body.removeChild(ta);
      toast('Order copied');
    }

    try{
      const arr=JSON.parse(localStorage.getItem('catalog_orders')||'[]');
      arr.push(payload);
      localStorage.setItem('catalog_orders',JSON.stringify(arr));
      const map=JSON.parse(localStorage.getItem('catalog_orders_map')||'{}');
      map[code]=payload;
      localStorage.setItem('catalog_orders_map',JSON.stringify(map));
      localStorage.setItem('jb_catalog_orders_map',JSON.stringify(map));
    }catch(_e){}
    let synced=true;
    try{
      const res=await fetch('/api/catalog-order',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify(payload)
      });
      if(!res.ok) synced=false;
    }catch(_e){synced=false;}
    if(!synced){
      toast('Order saved locally. Import with code or full copied message.');
    }

    const openUrl=normalizeMessengerLink(messengerLink);
    if(openUrl && shouldAutoOpenMessenger(openUrl)){
      try{window.open(openUrl,'_blank');}catch(_e){}
    }else{
      toast('Order copied. Paste into your Messenger chat.');
    }
    cart=[];
    updateCartUi();
    closeCheckout();
  }
  window.copyAndSendToMessenger=copyAndSendToMessenger;

  function applyRemoteCatalog(remote){
    const normalized=(remote.catalog||[]).map(normalizeProduct).filter(Boolean);
    if(!normalized.length) return false;
    products=normalized;
    categories=deriveCategories(products,remote.categories||[]);
    messengerLink=String(remote.settings&&remote.settings.messengerLink||messengerLink||'').trim()||'https://www.messenger.com';
    return true;
  }

  async function boot(){
    const loadingGuard=setTimeout(function(){
      if(stateEl&&stateEl.style.display!=='none'&&stateEl.textContent==='Loading catalog...'){
        stateEl.textContent='Catalog loading is taking longer than expected. Please refresh.';
      }
    },12000);

    try{
      const local=loadLocalCatalog().map(normalizeProduct).filter(Boolean);
      if(local.length){
        products=local;
        categories=deriveCategories(products,[]);
        stateEl.style.display='none';
        shopEl.style.display='block';
        renderCategories();
      }
      try{
        const remote=await loadRemoteData();
        if(applyRemoteCatalog(remote)){
          _remoteCatalogSignature=JSON.stringify(remote.catalog||[]);
          try{localStorage.setItem('jb_catalog',JSON.stringify(remote.catalog||[]));}catch(_e){}
          stateEl.style.display='none';
          shopEl.style.display='block';
          if(activeCategory){
            renderProducts();
          }else{
            renderCategories();
          }
        }else if(!products.length){
          stateEl.textContent='No products available yet.';
        }
      }catch(_remoteErr){
        if(!products.length){
          stateEl.textContent='Catalog could not be loaded. Please try again.';
        }
      }
    }catch(_e){
      stateEl.textContent='Catalog could not be loaded. Please try again.';
    }finally{
      clearTimeout(loadingGuard);
    }

    setInterval(async ()=>{
      try{
        const remote=await loadRemoteData();
        const signature=JSON.stringify(remote.catalog||[]);
        if(signature && signature!==_remoteCatalogSignature && applyRemoteCatalog(remote)){
          _remoteCatalogSignature=signature;
          try{localStorage.setItem('jb_catalog',JSON.stringify(remote.catalog||[]));}catch(_e){}
          if(activeCategory){
            renderProducts();
          }else{
            renderCategories();
          }
        }
      }catch(_e){}
    },20000);
  }

  boot();
})();
</script>
</body>
</html>
