<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JRSHOP Catalog</title>
<style>
  body { font-family: Arial, sans-serif; background: #f8fafc; color: #0f172a; margin: 0; }
  .wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .card { background: #fff; border: 1px solid #e2e8f0; border-radius: 14px; padding: 20px; max-width: 560px; width: 100%; box-shadow: 0 10px 30px rgba(15,23,42,.08); }
  .title { font-weight: 800; margin-bottom: 8px; }
  .muted { color: #64748b; font-size: 14px; }
  .btn { display: inline-block; margin-top: 14px; padding: 10px 14px; border-radius: 10px; background: #f97316; color: #fff; text-decoration: none; font-weight: 700; }
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="title">Catalog link changed</div>
    <div class="muted">Catalog is now published from the main app page. Please open JRSHOP and use Product Catalog → Share.</div>
    <a class="btn" href="./index.html">Open JRSHOP</a>
  </div>
</div>
</body>
</html>
