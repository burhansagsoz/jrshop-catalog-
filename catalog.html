<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JRSHOP Catalog</title>
<style>
  *{box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:#f8fafc;color:#0f172a;margin:0}
  .top{position:sticky;top:0;background:#fff;border-bottom:1px solid #e2e8f0;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;gap:8px;z-index:9}
  .brand{font-weight:800}
  .btn{display:inline-flex;align-items:center;justify-content:center;padding:8px 12px;border-radius:10px;border:1px solid #e2e8f0;background:#fff;color:#0f172a;text-decoration:none;font-weight:700;cursor:pointer}
  .btn-accent{background:#f97316;color:#fff;border-color:#f97316}
  .wrap{max-width:1100px;margin:0 auto;padding:14px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
  .card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;overflow:hidden}
  .img{width:100%;aspect-ratio:1/1;object-fit:cover;background:#eef2f7}
  .ph{width:100%;aspect-ratio:1/1;display:flex;align-items:center;justify-content:center;color:#94a3b8;background:#eef2f7;font-size:26px}
  .body{padding:10px}
  .nm{font-size:14px;font-weight:800}
  .ds{font-size:12px;color:#64748b;margin-top:5px;min-height:30px}
  .pr{margin-top:8px;font-weight:900;color:#f97316}
  .empty{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:26px;text-align:center;color:#64748b}
</style>
</head>
<body>
  <div class="top">
    <div class="brand">JRSHOP Catalog</div>
    <a class="btn" href="./index.html">Open App</a>
  </div>
  <div class="wrap">
    <div id="state" class="empty">Loading catalog...</div>
    <div id="list" class="grid" style="display:none;"></div>
  </div>
<script>
(async function(){
  const stateEl=document.getElementById('state');
  const listEl=document.getElementById('list');
  const FIREBASE_CONFIG_DEFAULT={
    apiKey:"AIzaSyBidcdMLlFsEp6c6P_tqwMMtP9w3wLKtFE",
    authDomain:"jrshop-d732e.firebaseapp.com",
    projectId:"jrshop-d732e",
    storageBucket:"jrshop-d732e.firebasestorage.app",
    messagingSenderId:"391477157629",
    appId:"1:391477157629:web:ec7a9ffb307deca6296894",
    measurementId:"G-B1RG9Z0D79"
  };
  function fetchWithTimeout(url, ms){
    const timeoutMs=Math.max(1000, Number(ms)||4500);
    const controller=new AbortController();
    const timer=setTimeout(()=>controller.abort(), timeoutMs);
    return fetch(url,{signal:controller.signal}).finally(()=>clearTimeout(timer));
  }
  function loadScript(src){
    return new Promise((resolve,reject)=>{
      const existing=document.querySelector('script[data-src="'+src+'"]');
      if(existing){
        if(existing.getAttribute('data-loaded')==='1') return resolve();
        existing.addEventListener('load',()=>resolve(),{once:true});
        existing.addEventListener('error',()=>reject(new Error('script load error')),{once:true});
        return;
      }
      const s=document.createElement('script');
      s.src=src;
      s.async=true;
      s.setAttribute('data-src',src);
      s.addEventListener('load',()=>{s.setAttribute('data-loaded','1');resolve();},{once:true});
      s.addEventListener('error',()=>reject(new Error('script load error')),{once:true});
      document.head.appendChild(s);
    });
  }
  async function loadCatalogFromApi(){
    const r=await fetchWithTimeout('/api/data', 4500);
    if(!r.ok) throw new Error('HTTP '+r.status);
    const payload=await r.json();
    const data=payload&&payload.data?payload.data:{};
    return Array.isArray(data.jb_catalog)?data.jb_catalog:[];
  }
  async function loadCatalogFromFirestore(){
    await loadScript('https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js');
    await loadScript('https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js');
    await loadScript('https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js');
    if(!window.firebase||!window.firebase.firestore||!window.firebase.auth) throw new Error('Firebase unavailable');
    const app=(window.firebase.apps&&window.firebase.apps.length)?window.firebase.app():window.firebase.initializeApp(FIREBASE_CONFIG_DEFAULT);
    const auth=window.firebase.auth(app);
    const db=window.firebase.firestore(app);
    if(!auth.currentUser){
      await auth.signInAnonymously();
    }
    const doc=await db.collection('app_data').doc('jb_catalog').get();
    const value=doc.exists?(doc.data()||{}).value:[];
    return Array.isArray(value)?value:[];
  }
  function renderCatalog(products){
    if(!products.length){
      stateEl.textContent='No products available yet.';
      return;
    }
    stateEl.style.display='none';
    listEl.style.display='grid';
    listEl.innerHTML=products.map(function(p){
      const name=String(p&&p.name||'Product');
      const desc=String(p&&p.desc||'');
      const img=(p&&p.img&&/^(https?:|data:|blob:|\/api\/image\/)/.test(String(p.img)))?String(p.img):'';
      const priceRaw=String(p&&p.price||'').replace(/[^0-9.]/g,'');
      const price=priceRaw?('£'+Number(priceRaw).toFixed(2)):'-';
      return '<div class="card">'
        +(img?('<img class="img" src="'+img+'" loading="lazy" onerror="this.style.display=\\'none\\';this.nextElementSibling.style.display=\\'flex\\';"><div class="ph" style="display:none;">🛍️</div>'):('<div class="ph">🛍️</div>'))
        +'<div class="body"><div class="nm">'+name.replace(/[<>&]/g,'')+'</div><div class="ds">'+desc.replace(/[<>&]/g,'')+'</div><div class="pr">'+price+'</div></div></div>';
    }).join('');
  }
  try{
    let products=[];
    try{
      products=await loadCatalogFromApi();
    }catch(_apiErr){
      products=await loadCatalogFromFirestore();
    }
    renderCatalog(products);
  }catch(_err){
    stateEl.textContent='Catalog could not be loaded. Please try again.';
  }
})();
</script>
</body>
</html>
