<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>JRSHOP — Shop</title>
<style>*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:#f1f5f9;min-height:100vh;}
.header{background:linear-gradient(135deg,#1a1a2e,#0f3460);padding:20px;text-align:center;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.3);}
.logo{display:inline-flex;align-items:center;gap:10px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:12px;padding:8px 18px;}
.logo-icon{font-size:24px;}
.logo-text{font-size:22px;font-weight:900;color:#f97316;}
.logo-sub{font-size:10px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:2px;}
.cart-btn{position:fixed;bottom:20px;right:20px;background:linear-gradient(135deg,#f97316,#ea580c);color:white;border:none;border-radius:16px;padding:14px 20px;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 4px 20px rgba(249,115,22,.4);z-index:200;display:none;}
.container{max-width:640px;margin:0 auto;padding:16px;}
.search-bar{background:white;border:1px solid #e2e8f0;border-radius:12px;padding:11px 16px;display:flex;align-items:center;gap:10px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.search-bar input{flex:1;border:none;outline:none;font-size:14px;background:transparent;}
.cats{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;margin-bottom:16px;scrollbar-width:none;}
.cats::-webkit-scrollbar{display:none;}
.cat-btn{padding:6px 14px;border-radius:20px;border:1px solid #e2e8f0;background:white;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;color:#475569;transition:.15s;}
.cat-btn.active{background:#f97316;color:white;border-color:#f97316;}
.products{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;}
.card{background:white;border-radius:14px;overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,.08);transition:.2s;cursor:pointer;}
.card:active{transform:scale(.98);}
.card-img{width:100%;aspect-ratio:1;background:#f8fafc;display:flex;align-items:center;justify-content:center;font-size:48px;overflow:hidden;}
.card-img img{width:100%;height:100%;object-fit:cover;}
.card-body{padding:10px 12px 12px;}
.card-name{font-size:13px;font-weight:700;color:#1a1a2e;margin-bottom:3px;line-height:1.3;}
.card-desc{font-size:11px;color:#94a3b8;margin-bottom:6px;line-height:1.4;}
.card-price{font-size:16px;font-weight:900;color:#f97316;}
.card-stock{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;display:inline-block;margin-top:4px;}
.in-stock{background:#dcfce7;color:#166534;}
.out-stock{background:#fee2e2;color:#991b1b;}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;align-items:flex-end;justify-content:center;}
.overlay.open{display:flex;}
.prod-sheet{background:white;border-radius:20px 20px 0 0;width:100%;max-width:640px;max-height:90vh;overflow-y:auto;padding:20px;}
.drag-handle{width:40px;height:4px;background:#e2e8f0;border-radius:2px;margin:0 auto 16px;}
.variants-wrap{display:flex;flex-wrap:wrap;gap:7px;margin:10px 0 14px;}
.variant-chip{padding:7px 14px;border:2px solid #e2e8f0;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;background:white;transition:.15s;}
.variant-chip.selected{border-color:#f97316;background:#fff7ed;color:#f97316;}
.qty-row{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.qty-btn{width:36px;height:36px;border-radius:10px;border:1px solid #e2e8f0;background:white;font-size:18px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.qty-val{font-size:18px;font-weight:800;min-width:32px;text-align:center;}
.add-to-cart-btn{width:100%;background:linear-gradient(135deg,#f97316,#ea580c);color:white;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;}
.cart-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:400;align-items:flex-end;justify-content:center;}
.cart-overlay.open{display:flex;}
.cart-sheet{background:white;border-radius:20px 20px 0 0;width:100%;max-width:640px;max-height:85vh;overflow-y:auto;padding:20px;}
.cart-item{display:flex;gap:11px;padding:10px 0;border-bottom:1px solid #f1f5f9;}
.cart-item-img{width:48px;height:48px;border-radius:9px;background:#f8fafc;border:1px solid #e2e8f0;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:20px;overflow:hidden;}
.cart-item-img img{width:100%;height:100%;object-fit:cover;}
.cart-total{font-size:20px;font-weight:900;color:#f97316;text-align:right;padding:14px 0;}
.checkout-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;align-items:flex-end;justify-content:center;}
.checkout-overlay.open{display:flex;}
.checkout-sheet{background:white;border-radius:20px 20px 0 0;width:100%;max-width:640px;max-height:90vh;overflow-y:auto;padding:20px;}
input.fi,textarea.fi{width:100%;padding:11px 13px;border:1px solid #e2e8f0;border-radius:10px;font-size:14px;outline:none;margin-bottom:10px;font-family:inherit;}
input.fi:focus,textarea.fi:focus{border-color:#f97316;}
label.fl{font-size:12px;font-weight:700;color:#475569;display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px;}
.section-title{font-size:13px;font-weight:800;color:#1a1a2e;margin:14px 0 8px;padding-bottom:6px;border-bottom:2px solid #f97316;}
.send-btn{width:100%;background:linear-gradient(135deg,#f97316,#ea580c);color:white;border:none;border-radius:12px;padding:16px;font-size:16px;font-weight:700;cursor:pointer;margin-top:8px;}
.empty{text-align:center;color:#94a3b8;padding:32px;font-size:14px;}</style>
</head>
<body>
<div class="header">
  <div class="logo">
    <span class="logo-icon">🛍️</span>
    <div><div class="logo-text">JRSHOP</div><div class="logo-sub">Official Store</div></div>
  </div>
</div>
<button class="cart-btn" id="cart-btn" onclick="openCart()">🛒 <span id="cart-count">0</span></button>
<div class="container">
  <div class="search-bar">
    <span style="font-size:16px;color:#94a3b8;">🔍</span>
    <input type="text" id="search-input" placeholder="Search products…" oninput="filterProducts()">
  </div>
  <div class="cats" id="cat-filters"></div>
  <div class="products" id="products-grid"></div>
</div>
<div class="overlay" id="prod-overlay" onclick="if(event.target===this)closeProdSheet()">
  <div class="prod-sheet">
    <div class="drag-handle"></div>
    <div id="prod-sheet-content"></div>
  </div>
</div>
<div class="cart-overlay" id="cart-overlay" onclick="if(event.target===this)closeCart()">
  <div class="cart-sheet">
    <div class="drag-handle"></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
      <h2 style="font-size:18px;font-weight:800;">🛒 Your Cart</h2>
      <button onclick="closeCart()" style="background:none;border:none;font-size:20px;cursor:pointer;">✕</button>
    </div>
    <div id="cart-items-list"></div>
    <div class="cart-total" id="cart-total-display"></div>
    <button class="add-to-cart-btn" onclick="openCheckout()" id="checkout-btn" style="display:none;">Checkout →</button>
  </div>
</div>
<div class="checkout-overlay" id="checkout-overlay" onclick="if(event.target===this)closeCheckout()">
  <div class="checkout-sheet">
    <div class="drag-handle"></div>
    <h2 style="font-size:18px;font-weight:800;margin-bottom:4px;">📋 Your Details</h2>
    <p style="font-size:13px;color:#94a3b8;margin-bottom:14px;">Fill in your details and send your order via Messenger.</p>
    <div class="section-title">👤 Personal Info</div>
    <label class="fl">Full Name <span style="color:#ef4444;">*</span></label><input type="text" class="fi" id="co-name" placeholder="Sarah Jones" autocomplete="name">
    <label class="fl">Phone Number <span style="color:#ef4444;">*</span></label><input type="tel" class="fi" id="co-phone" placeholder="+44 7700 000000" autocomplete="tel">
    <label class="fl">Email Address <span style="color:#ef4444;">*</span></label><input type="email" class="fi" id="co-email" placeholder="sarah@email.com" autocomplete="email">
    <div class="section-title">📍 Delivery Address</div>
    <label class="fl">Street Address <span style="color:#ef4444;">*</span></label><input type="text" class="fi" id="co-addr" placeholder="12 Baker Street" autocomplete="address-line1">
    <label class="fl">City <span style="color:#ef4444;">*</span></label><input type="text" class="fi" id="co-city" placeholder="London" autocomplete="address-level2">
    <label class="fl">Postcode <span style="color:#ef4444;">*</span></label><input type="text" class="fi" id="co-post" placeholder="SW1A 1AA" autocomplete="postal-code" style="text-transform:uppercase;">
    <label class="fl">State / County</label><input type="text" class="fi" id="co-county" placeholder="Greater London" autocomplete="address-level1">
    <label class="fl">Order Notes</label><textarea class="fi" id="co-note" placeholder="Colour, size preference, special requests…" style="min-height:70px;"></textarea>
    <div id="co-shipping-display" style="background:#fff7ed;border:1px solid #fed7aa;border-radius:10px;padding:11px 14px;margin-bottom:10px;font-size:13px;"></div>
    <button class="send-btn" onclick="sendOrder()">💬 Send Order via Messenger</button>
  </div>
</div>

var CATEGORIES=["Shoes","Bags","Accessories"];
var MESSENGER_LINK='https://m.me/JOSHROBBEN';
var cart=[];
var currentProd=null,selectedVariant=null,qty=1;
var _activeCat="";

function init(){renderCatFilters();renderProducts(PRODUCTS);}

function renderCatFilters(){
  var cats=CATEGORIES.length?CATEGORIES:[...new Set(PRODUCTS.map(function(p){return p.category}).filter(Boolean))];
  var el=document.getElementById("cat-filters");
  if(!el)return;
  var html="<button class=\"cat-btn active\" onclick=\"filterCat(this,'')\">"+"All ("+PRODUCTS.length+")"+"</button>";
  cats.forEach(function(c){
    var count=PRODUCTS.filter(function(p){return p.category===c}).length;
    if(count) html+="<button class=\"cat-btn\" onclick=\"filterCat(this,'"+c+"')\">"+c+" ("+count+")</button>";
  });
  el.innerHTML=html;
}

function filterCat(btn,cat){
  _activeCat=cat;
  document.querySelectorAll(".cat-btn").forEach(function(b){b.classList.remove("active");});
  btn.classList.add("active");
  filterProducts();
}

function filterProducts(){
  var q=document.getElementById("search-input").value.toLowerCase();
  var filtered=PRODUCTS.filter(function(p){
    return(!_activeCat||p.category===_activeCat)&&(!q||p.name.toLowerCase().includes(q)||(p.desc||"").toLowerCase().includes(q));
  });
  renderProducts(filtered);
}

function renderProducts(list){
  var grid=document.getElementById("products-grid");
  if(!list.length){grid.innerHTML="<div class=\"empty\">No products found.</div>";return;}
  grid.innerHTML=list.map(function(p){
    var imgHTML=p.img?"<img src=\""+p.img+"\" loading=\"lazy\">":"🛍️";
    var stockBadge=p.inStock===false?"<span class=\"card-stock out-stock\">Out of Stock</span>":"<span class=\"card-stock in-stock\">In Stock</span>";
    return "<div class=\"card\" onclick=\"openProdSheet('"+p.id+"')\">"+
      "<div class=\"card-img\">"+imgHTML+"</div>"+
      "<div class=\"card-body\">"+
      "<div class=\"card-name\">"+p.name+"</div>"+
      (p.desc?"<div class=\"card-desc\">"+p.desc+"</div>":"")+
      "<div class=\"card-price\">£"+parseFloat(p.price||0).toFixed(2)+"</div>"+
      stockBadge+
      "</div></div>";
  }).join("");
}

function openProdSheet(id){
  currentProd=PRODUCTS.find(function(p){return p.id===id});
  if(!currentProd)return;
  selectedVariant=currentProd.variants&&currentProd.variants.length===1?currentProd.variants[0]:null;
  qty=1;
  renderProdSheet();
  document.getElementById("prod-overlay").classList.add("open");
}

function closeProdSheet(){document.getElementById("prod-overlay").classList.remove("open");}

function renderProdSheet(){
  var p=currentProd;
  var imgHTML=p.img?"<img src=\""+p.img+"\" style=\"width:100%;height:100%;object-fit:cover;border-radius:12px;\">":" 🛍️";
  var varHTML="";
  if(p.variantGroups&&p.variantGroups.length){
    p.variantGroups.forEach(function(g){
      if(!g.values||!g.values.length)return;
      varHTML+="<div style=\"font-size:12px;font-weight:700;color:#1a1a2e;margin-bottom:6px;margin-top:8px;\">"+(g.name||"Options")+":</div>";
      varHTML+="<div class=\"variants-wrap\">";
      g.values.forEach(function(v){
        var key=g.name+":"+v.label;
        var sel=selectedVariant===key;
        if(g.hasImg&&v.img){
          varHTML+="<button class=\"variant-chip"+(sel?" selected":"")+"\" onclick=\"selectVariant('"+key+"')\" style=\"display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px;\"><img src=\""+v.img+"\" style=\"width:44px;height:44px;object-fit:cover;border-radius:6px;\"><span style=\"font-size:11px;\">"+(v.label||"")+"</span></button>";
        } else {
          varHTML+="<button class=\"variant-chip"+(sel?" selected":"")+"\" onclick=\"selectVariant('"+key+"')\">"+v.label+"</button>";
        }
      });
      varHTML+="</div>";
    });
  } else if(p.variants&&p.variants.length){
    varHTML+="<div class=\"variants-wrap\">";
    varHTML+=p.variants.map(function(v){
      return "<button class=\"variant-chip"+(selectedVariant===v?" selected":"")+"\" onclick=\"selectVariant('"+v+"')\">"+v+"</button>";
    }).join("");
    varHTML+="</div>";
  }
  document.getElementById("prod-sheet-content").innerHTML=
    "<div style=\"width:100%;aspect-ratio:16/9;background:#f8fafc;border-radius:12px;margin-bottom:14px;display:flex;align-items:center;justify-content:center;font-size:64px;overflow:hidden;\">"+imgHTML+"</div>"+
    "<h2 style=\"font-size:20px;font-weight:800;color:#1a1a2e;margin-bottom:6px;\">"+p.name+"</h2>"+
    (p.category?"<div style=\"font-size:12px;color:#94a3b8;margin-bottom:8px;\">"+p.category+"</div>":"")+
    (p.desc?"<div style=\"font-size:14px;color:#475569;margin-bottom:10px;line-height:1.6;\">"+p.desc+"</div>":"")+
    "<div style=\"font-size:24px;font-weight:900;color:#f97316;margin-bottom:12px;\">£"+parseFloat(p.price||0).toFixed(2)+"</div>"+
    "<span class=\"card-stock "+(p.inStock===false?"out-stock":"in-stock")+"\" style=\"margin-bottom:12px;display:inline-block;\">"+(p.inStock===false?"Out of Stock":"In Stock")+"</span>"+
    varHTML+
    "<div class=\"qty-row\"><span style=\"font-size:13px;font-weight:700;color:#1a1a2e;\">Quantity:</span>"+
    "<button class=\"qty-btn\" onclick=\"changeQty(-1)\">−</button>"+
    "<span class=\"qty-val\" id=\"qty-display\">"+qty+"</span>"+
    "<button class=\"qty-btn\" onclick=\"changeQty(1)\">+</button></div>"+
    "<button class=\"add-to-cart-btn\" onclick=\"addToCart()\""+(p.inStock===false?" disabled":"")+">"+(p.inStock===false?"Out of Stock":"Add to Cart 🛒")+"</button>";
}

function selectVariant(v){
  selectedVariant=v;
  renderProdSheet();
}

function changeQty(d){qty=Math.max(1,qty+d);document.getElementById("qty-display").textContent=qty;}

function addToCart(){
  if(!currentProd)return;
  var needsVariant=(currentProd.variantGroups&&currentProd.variantGroups.length>0)||(currentProd.variants&&currentProd.variants.length>1);
  if(needsVariant&&!selectedVariant){toast2("Please select a variant");return;}
  var existing=cart.find(function(i){return i.id===currentProd.id&&i.variant===selectedVariant});
  if(existing)existing.qty+=qty;
  else cart.push({id:currentProd.id,name:currentProd.name,price:currentProd.price,img:currentProd.img,variant:selectedVariant,qty:qty});
  updateCartBadge();
  closeProdSheet();
  toast2(qty+"x "+currentProd.name+" added!");
}

function updateCartBadge(){
  var total=cart.reduce(function(s,i){return s+i.qty},0);
  var btn=document.getElementById("cart-btn");
  var cnt=document.getElementById("cart-count");
  if(btn)btn.style.display=total?"flex":"none";
  if(cnt)cnt.textContent=total;
}

function openCart(){document.getElementById("cart-overlay").classList.add("open");renderCartItems();}
function closeCart(){document.getElementById("cart-overlay").classList.remove("open");}
function openCheckout(){
  document.getElementById("cart-overlay").classList.remove("open");
  document.getElementById("checkout-overlay").classList.add("open");
  var itemCount=cart.reduce(function(s,i){return s+i.qty},0);
  var subtotal=cart.reduce(function(s,i){return s+(i.price*i.qty)},0);
  var shipping=itemCount>0?5+Math.max(0,itemCount-1)*2.5:0;
  var el=document.getElementById("co-shipping-display");
  if(el)el.innerHTML="<strong>🚚 Shipping: £"+shipping.toFixed(2)+"</strong> (£5 first item + £2.50 per extra item)<br><strong>💰 Total inc. shipping: £"+(subtotal+shipping).toFixed(2)+"</strong>";
}
function closeCheckout(){document.getElementById("checkout-overlay").classList.remove("open");}

function updateCartQty(i,d){
  cart[i].qty+=d;
  if(cart[i].qty<1)cart.splice(i,1);
  updateCartBadge();
  renderCartItems();
}
function removeFromCart(i){cart.splice(i,1);updateCartBadge();renderCartItems();}

function renderCartItems(){
  var el=document.getElementById("cart-items-list");
  var checkoutBtn=document.getElementById("checkout-btn");
  var totalEl=document.getElementById("cart-total-display");
  if(!cart.length){
    el.innerHTML="<div class=\"empty\">Your cart is empty</div>";
    if(totalEl)totalEl.textContent="";
    if(checkoutBtn)checkoutBtn.style.display="none";
    return;
  }
  el.innerHTML=cart.map(function(item,i){
    return "<div class=\"cart-item\">"+
      "<div class=\"cart-item-img\">"+(item.img?"<img src=\""+item.img+"\">":" 🛍️")+"</div>"+
      "<div style=\"flex:1;\">"+
      "<div style=\"font-size:13px;font-weight:700;\">"+item.name+"</div>"+
      (item.variant?"<div style=\"font-size:12px;color:#94a3b8;\">"+item.variant+"</div>":"")+
      "<div style=\"font-size:13px;font-weight:800;color:#f97316;margin-top:3px;\">£"+(item.price*item.qty).toFixed(2)+"</div>"+
      "</div>"+
      "<div style=\"display:flex;align-items:center;gap:8px;\">"+
      "<button onclick=\"updateCartQty("+i+",-1)\" style=\"width:28px;height:28px;border:1px solid #e2e8f0;border-radius:7px;background:white;font-size:14px;cursor:pointer;\">−</button>"+
      "<span style=\"font-size:14px;font-weight:700;min-width:20px;text-align:center;\">"+item.qty+"</span>"+
      "<button onclick=\"updateCartQty("+i+",1)\" style=\"width:28px;height:28px;border:1px solid #e2e8f0;border-radius:7px;background:white;font-size:14px;cursor:pointer;\">+</button>"+
      "<button onclick=\"removeFromCart("+i+")\" style=\"width:28px;height:28px;border:1px solid #fee2e2;border-radius:7px;background:#fee2e2;color:#ef4444;font-size:14px;cursor:pointer;\">✕</button>"+
      "</div></div>";
  }).join("");
  var total=cart.reduce(function(s,i){return s+(i.price*i.qty)},0);
  var itemCount=cart.reduce(function(s,i){return s+i.qty},0);
  var shipping=itemCount>0?5+Math.max(0,itemCount-1)*2.5:0;
  var grandTotal=total+shipping;
  if(totalEl){
    totalEl.innerHTML="<div style="display:flex;justify-content:space-between;margin-bottom:4px;"><span>Subtotal:</span><span>£"+total.toFixed(2)+"</span></div>"+
      "<div style="display:flex;justify-content:space-between;margin-bottom:6px;color:#64748b;"><span>Shipping ("+itemCount+" item"+(itemCount>1?"s":"")+"):</span><span>£"+shipping.toFixed(2)+"</span></div>"+
      "<div style="display:flex;justify-content:space-between;font-size:20px;font-weight:900;color:#f97316;border-top:2px solid #f1f5f9;padding-top:8px;"><span>Total:</span><span>£"+grandTotal.toFixed(2)+"</span></div>";
  }
  if(checkoutBtn)checkoutBtn.style.display="block";
}

function sendOrder(){
  var name=document.getElementById("co-name").value.trim();
  var phone=document.getElementById("co-phone").value.trim();
  var addr=document.getElementById("co-addr").value.trim();
  var city=document.getElementById("co-city").value.trim();
  var post=document.getElementById("co-post").value.trim();
  var county=document.getElementById("co-county")?document.getElementById("co-county").value.trim():"";
  if(!name||!phone||!addr||!city||!post){toast2("Please fill in all required fields (*)");return;}
  if(post.length<5||post.length>8){toast2("Please enter a valid UK postcode");return;}
  if(!cart.length){toast2("Your cart is empty");return;}
  var orderId="JRORDER-"+Date.now();
  var subtotal=cart.reduce(function(s,i){return s+(i.price*i.qty)},0);
  var itemCount=cart.reduce(function(s,i){return s+i.qty},0);
  var shipping=itemCount>0?5+Math.max(0,itemCount-1)*2.5:0;
  var total=subtotal+shipping;
  var orderData={id:orderId,name:name,phone:phone,
    email:document.getElementById("co-email").value.trim(),
    address:addr,city:city,postcode:post,county:county,country:"GB",
    note:document.getElementById("co-note").value.trim(),
    products:cart.map(function(i){return{name:i.name+(i.variant?" — "+i.variant:""),qty:i.qty,price:i.price}}),
    total:total,ts:Date.now()};
  var itemsList=cart.map(function(i){
    return "  • "+i.name+(i.variant?" ("+i.variant+")":"")+" x"+i.qty+" — £"+(i.price*i.qty).toFixed(2);
  }).join("\n");
  var emailVal=document.getElementById("co-email").value;
  var noteVal=document.getElementById("co-note").value;
  var msg="🛍️ NEW ORDER — JRSHOP\n"
    +"━━━━━━━━━━━━━━━━━━━━\n"
    +"Order ID: "+orderId+"\n\n"
    +"👤 CUSTOMER\n"
    +"Name: "+name+"\n"
    +"Phone: "+phone+"\n"
    +(emailVal?"Email: "+emailVal+"\n":"")+"\n"
    +"📦 ITEMS\n"+itemsList+"\n\n"
    +"💰 SUBTOTAL: £"+subtotal.toFixed(2)+"\n"
    +"🚚 SHIPPING: £"+shipping.toFixed(2)+"\n"
    +"💰 TOTAL: £"+total.toFixed(2)+"\n\n"
    +"📍 DELIVERY ADDRESS\n"
    +addr+"\n"+city+", "+post+(county?", "+county:"")+", UK\n"
    +(noteVal?"\n📝 Note: "+noteVal+"\n":"")+"\n"
    +"📋 ORDER CODE (for tracking):\n"+orderId+"\n\n"
    +"[Data:"+btoa(unescape(encodeURIComponent(JSON.stringify(orderData))))+"]";
  var url=MESSENGER_LINK||"https://www.messenger.com";
  if(!url.startsWith("http"))url="https://"+url;
  // First show success screen with copy button
  document.getElementById("checkout-overlay").classList.remove("open");
  showSuccess(orderId, msg, url);
}

function showSuccess(orderId, orderMsg, messengerUrl){
  var overlay=document.createElement("div");
  overlay.id="success-screen";
  overlay.style.cssText="position:fixed;inset:0;background:rgba(26,26,46,.95);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px;";
  var box=document.createElement("div");
  box.style.cssText="background:white;border-radius:20px;padding:24px;max-width:400px;width:100%;text-align:center;";
  var icon=document.createElement("div");
  icon.textContent="✅";
  icon.style.cssText="font-size:56px;margin-bottom:12px;";
  box.appendChild(icon);
  var title=document.createElement("h2");
  title.textContent="Order Sent!";
  title.style.cssText="font-size:20px;font-weight:800;color:#1a1a2e;margin-bottom:8px;";
  box.appendChild(title);
  var desc=document.createElement("p");
  desc.innerHTML="<strong>3 kolay step:</strong><br>1️⃣ Aşağıdaki butona bas (mesaj kopyalanır)<br>2️⃣ Messenger açılır<br>3️⃣ Mesaj kutusuna <strong>uzun bas → Yapıştır</strong> → Send";
  desc.style.textAlign="left";
  desc.style.cssText="font-size:13px;color:#475569;margin-bottom:12px;";
  box.appendChild(desc);
  var idBox=document.createElement("div");
  idBox.textContent=orderId;
  idBox.style.cssText="background:#f1f5f9;border-radius:8px;padding:10px;margin-bottom:12px;font-family:monospace;font-size:12px;font-weight:700;color:#f97316;";
  box.appendChild(idBox);
  if(orderMsg){
    var label=document.createElement("div");
    label.textContent="Order message — copy and paste into Messenger:";
    label.style.cssText="font-size:11px;font-weight:700;color:#475569;margin-bottom:6px;text-align:left;";
    box.appendChild(label);
    var ta=document.createElement("textarea");
    ta.readOnly=true;
    ta.value=orderMsg;
    ta.style.cssText="width:100%;height:100px;font-size:11px;border:1.5px solid #e2e8f0;border-radius:8px;padding:8px;font-family:monospace;resize:none;margin-bottom:8px;";
    box.appendChild(ta);
    var copyBtn=document.createElement("button");
    copyBtn.textContent="1️⃣ Kopyala ve Messengera Git";
    copyBtn.style.cssText="width:100%;background:#25D366;color:white;border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:8px;";
    copyBtn.addEventListener("click",function(){
      ta.select();
      ta.setSelectionRange(0,99999);
      var copied=false;
      try{document.execCommand("copy");copied=true;}catch(e){}
      copyBtn.textContent=copied?"✅ Copied! Opening Messenger…":"Opening Messenger…";
      copyBtn.style.background="#128C7E";
      setTimeout(function(){
        if(messengerUrl)window.open(messengerUrl,"_blank");
      },600);
    });
    box.appendChild(copyBtn);
  }
  var doneBtn=document.createElement("button");
  doneBtn.textContent="🛍️ Continue Shopping";
  doneBtn.style.cssText="width:100%;background:linear-gradient(135deg,#f97316,#ea580c);color:white;border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;";
  doneBtn.addEventListener("click",function(){overlay.remove();});
  box.appendChild(doneBtn);
  overlay.appendChild(box);
  document.body.appendChild(overlay);
  if(orderMsg){
    var ta2=box.querySelector("textarea");
    if(ta2){ta2.focus();ta2.select();}
  }
}

function toast2(msg){
  var t=document.createElement("div");
  t.textContent=msg;
  t.style.cssText="position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:white;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:9999;white-space:nowrap;";
  document.body.appendChild(t);
  setTimeout(function(){t.remove()},2500);
}

init();
</script>
</body>
</html>
